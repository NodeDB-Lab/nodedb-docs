name: Build

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Oxidoc
        run: curl -fsSL https://raw.githubusercontent.com/oxidoc-lab/oxidoc/main/scripts/install.sh | sh

      - name: Build site
        run: oxidoc build
