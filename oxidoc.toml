[project]
name = "NodeDB"
description = "Distributed hybrid database for multi-modal AI and agentic workloads — Vector, Graph, Document, Columnar, Key-Value, Full-Text Search, and CRDT engines in a single Rust binary."
logo = "/assets/logo.svg"
favicon = "/assets/logo.svg"
base_url = "https://nodedb.dev"
edit_url = "https://github.com/NodeDB-Lab/nodedb-docs/blob/main"

[theme]
primary = "#3b82f6"
accent = "#2dd4bf"
code_font = "JetBrains Mono"
dark_mode = "system"
custom_css = ["assets/custom.css"]

[routing.root]
homepage = "home.rdx"

[routing]
header_links = [{ label = "Docs", href = "/docs" }]
navigation = [
  { path = "/docs", dir = "docs", groups = [

    # ── Introduction ───────────────────────────────────────────────
    { group = "Getting Started", pages = [
      "introduction/what-is-nodedb",
      "introduction/quickstart",
      "introduction/installation",
      "introduction/docker",
    ] },

    # ── Architecture ───────────────────────────────────────────────
    { group = "Architecture", pages = [
      "architecture/overview",
      "architecture/control-plane",
      "architecture/data-plane",
      "architecture/event-plane",
      "architecture/spsc-bridge",
    ] },
    { group = "Storage", pages = [
      "architecture/storage-tiers",
      "architecture/wal",
      "architecture/consistency",
    ] },
    { group = "Cluster & Replication", pages = [
      "architecture/cluster-topology",
      "architecture/multi-raft",
      "architecture/vshards",
      "architecture/replication",
    ] },

    # ── Data Modeling ──────────────────────────────────────────────
    { group = "Data Modeling", pages = [
      "data-modeling/collections",
      "data-modeling/schemas-types",
    ] },
    { group = "Storage Engines", pages = [
      "data-modeling/vector",
      "data-modeling/graph",
      "data-modeling/document",
      "data-modeling/columnar",
      "data-modeling/kv",
      "data-modeling/fts",
      "data-modeling/crdt",
    ] },
    { group = "Columnar Profiles", pages = [
      "data-modeling/timeseries",
      "data-modeling/spatial",
    ] },
    { group = "Indexes", pages = [
      "data-modeling/hnsw-index",
      "data-modeling/csr-index",
      "data-modeling/rtree-index",
      "data-modeling/btree-index",
      "data-modeling/inverted-index",
      "data-modeling/hash-index",
    ] },

    # ── SQL Reference ──────────────────────────────────────────────
    { group = "Core SQL", pages = [
      "sql/overview",
      "sql/ddl",
      "sql/select",
      "sql/insert-upsert",
      "sql/update-delete",
      "sql/joins-aggregations",
      "sql/functions",
    ] },
    { group = "Engine Queries", pages = [
      "sql/vector-search",
      "sql/fulltext-search",
      "sql/graph-queries",
      "sql/spatial-queries",
      "sql/crdt-operations",
      "sql/fusion-rrf",
    ] },
    { group = "Diagnostics", pages = [
      "sql/explain",
    ] },

    # ── Real-Time ─────────────────────────────────────────────────
    { group = "Real-Time", pages = [
      "real-time/live-select",
      "real-time/change-streams",
      "real-time/consumer-groups",
      "real-time/webhooks",
      "real-time/cron-scheduler",
    ] },

    # ── Connectivity ───────────────────────────────────────────────
    { group = "Wire Protocols", pages = [
      "connectivity/pgwire",
      "connectivity/http-api",
      "connectivity/native-protocol",
      "connectivity/resp",
      "connectivity/ilp",
      "connectivity/sync-protocol",
    ] },
    { group = "Client Libraries", pages = [
      "connectivity/rust-client",
      "connectivity/python-driver",
    ] },
    { group = "Ecosystem", pages = [
      "connectivity/ecosystem",
    ] },

    # ── Administration ─────────────────────────────────────────────
    { group = "Configuration", pages = [
      "administration/configuration",
    ] },
    { group = "Security", pages = [
      "administration/authentication",
      "administration/rbac",
      "administration/rls",
      "administration/tls",
      "administration/audit-logging",
      "administration/multi-tenancy",
    ] },
    { group = "Operations", pages = [
      "administration/monitoring",
      "administration/backup-recovery",
      "administration/cluster-operations",
      "administration/memory-management",
      "administration/performance-tuning",
      "administration/production-checklist",
    ] },

    # ── CRDT Sync ─────────────────────────────────────────────────
    { group = "Edge Sync", pages = [
      "crdt-sync/overview",
      "crdt-sync/conflict-policies",
      "crdt-sync/constraint-validation",
      "crdt-sync/dead-letter-queue",
      "crdt-sync/offline-sync",
    ] },

    # ── Reference ─────────────────────────────────────────────────
    { group = "Reference", pages = [
      "reference/error-codes",
      "reference/sqlstate-mapping",
      "reference/type-oids",
      "reference/wire-protocol-specs",
      "reference/wal-segment-formats",
      "reference/engine-config",
      "reference/limits-defaults",
      "reference/feature-flags",
    ] },

  ] },
]

